<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bezier Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <label for="orderInput">Curve order</label>
        <input id="orderInput" type="number" min="1" max="8" value="5" />

        <button id="zoomInButton" type="button">Zoom +</button>
        <button id="zoomOutButton" type="button">Zoom -</button>
        <button id="resetViewButton" type="button">Reset View</button>

        <label for="bgImageInput">Background image</label>
        <input id="bgImageInput" type="file" accept="image/*" />

        <label for="middleTInput">Middle point parameter (t)</label>
        <input id="middleTInput" type="range" min="0.05" max="0.95" step="0.01" value="0.5" />
        <output id="middleTValue" for="middleTInput">0.50</output>
        <span id="minRadiusInfo" class="metric-text" aria-live="polite">Minimum radius: --</span>
      </section>

      <canvas id="bezierCanvas" width="1000" height="650" aria-label="Bezier editor canvas"></canvas>
      <div class="derivative-row">
        <canvas id="deriv1Canvas" width="1000" height="300" class="derivative-canvas" aria-label="Tangent angle graph"></canvas>
        <canvas id="deriv2Canvas" width="1000" height="300" class="derivative-canvas" aria-label="Radius of curvature graph"></canvas>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
